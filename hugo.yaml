languageCode: en-us
theme: papermod
enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
minify:
  disableXML: true
languages:
  en:
    menu:
      main:
        - name: home
          url: /
          weight: 1
        # - name: tags
        #   url: tags/
        #   weight: 2
        - name: rss
          url: index.xml
          weight: 3
        - name: about
          url: https://hangg7.github.io/
          weight: 100
outputs:
  home:
    - HTML
    - RSS
    - JSON
params:
  env: production
  author: Hang
  defaultTheme: light
  disableThemeToggle: true
  ShowShareButtons: false
  ShowReadingTime: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: false
  TocOpen: false
  showFullTextinRSS: true
  comments: false
  homeInfoParams:
    title: "hang's blog"
    Content: >
      {{< figure src="ader-fall-2.jpg" caption="Bas Jan Ader, Fall 2, 1970, Amsterdam" >}}
      <br>
      人通过意义来保护他的生活，这里记录着我的一些尝试。
markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
        enable: true
    renderer:
      unsafe: true
