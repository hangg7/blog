<!-- Add fonts/stylesheet.css -->
<link
  href="https://fonts.googleapis.com/css2?family=Shippori+Mincho&display=swap"
  rel="stylesheet"
/>
<link
  crossorigin="anonymous"
  href="/fonts/stylesheet.css"
  rel="preload stylesheet"
  as="style"
/>
<!-- Add MathJax support -->
<script
  id="MathJax-script"
  async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"
></script>
<script>
  MathJax = {
    tex: {
      displayMath: [
        ["\\[", "\\]"],
        ["$$", "$$"],
      ], // block
      inlineMath: [["\\(", "\\)"]], // inline
    },
    loader: {
      load: ["ui/safe"],
    },
  };
</script>
